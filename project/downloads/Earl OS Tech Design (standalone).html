  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n  src: url(\"9124cecb-27b8-4cff-ae42-21290322f6a8\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bg:           #08111f;\n    --bg-2:         #0c1a30;\n    --panel:        #0f1d34;\n    --panel-2:      #142a48;\n    --panel-3:      #1a3155;\n    --border:       #1f3b66;\n    --border-soft:  rgba(120, 160, 210, 0.10);\n    --border-strong:#2c4d80;\n    --text:         #e8edf5;\n    --text-2:       #b9c7dc;\n    --text-dim:     #7d90af;\n    --text-faint:   #4f6485;\n    --red:          #a8323b;\n    --red-bright:   #c43e49;\n    --blue:         #4267a3;\n    --blue-bright:  #5b85c7;\n    --green:        #4caf6a;\n    --amber:        #d4a437;\n    --ff-display: \"Barlow Condensed\", Impact, sans-serif;\n    --ff-sans:    \"Inter\", system-ui, -apple-system, sans-serif;\n    --ff-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, monospace;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--ff-sans);\n    color: var(--text-2);\n    font-size: 15px;\n    line-height: 1.6;\n    background:\n      radial-gradient(ellipse at 20% 0%, rgba(66,103,163,0.10), transparent 50%),\n      radial-gradient(ellipse at 100% 100%, rgba(168,50,59,0.06), transparent 55%),\n      linear-gradient(180deg, #0a1426 0%, #050b16 100%);\n    background-attachment: fixed;\n    min-height: 100vh;\n  }\n\n  /* ── Top bar ───────────────────────────────────────────── */\n  .topbar {\n    position: sticky; top: 0; z-index: 100;\n    background: rgba(10, 20, 38, 0.85);\n    -webkit-backdrop-filter: blur(20px) saturate(140%);\n    backdrop-filter: blur(20px) saturate(140%);\n    border-bottom: 1px solid var(--border);\n    padding: 14px 28px;\n    display: flex; align-items: center; gap: 14px;\n  }\n  .topbar img { width: 32px; height: 32px; border-radius: 5px; }\n  .topbar-brand {\n    font-family: var(--ff-display);\n    font-size: 18px; font-weight: 700; letter-spacing: 0.18em;\n    color: var(--text);\n  }\n  .topbar-sep { color: var(--text-faint); }\n  .topbar-doc {\n    font-family: var(--ff-display);\n    font-size: 13px; font-weight: 500; letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--text-dim);\n  }\n  .topbar-meta {\n    margin-left: auto;\n    font-family: var(--ff-mono);\n    font-size: 11px; color: var(--text-faint);\n    letter-spacing: 0.04em;\n  }\n\n  /* ── Layout ────────────────────────────────────────────── */\n  .layout {\n    display: grid;\n    grid-template-columns: 260px minmax(0, 1fr);\n    max-width: 1400px;\n    margin: 0 auto;\n    gap: 40px;\n    padding: 32px 28px 96px;\n  }\n  .toc {\n    position: sticky; top: 76px;\n    align-self: start;\n    max-height: calc(100vh - 100px);\n    overflow: auto;\n    padding-right: 4px;\n  }\n  .toc-title {\n    font-family: var(--ff-display);\n    font-size: 11px; font-weight: 600; letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--text-faint);\n    margin-bottom: 10px;\n  }\n  .toc-list { list-style: none; margin: 0; padding: 0; }\n  .toc-list a {\n    display: block;\n    padding: 5px 10px;\n    margin-bottom: 1px;\n    border-left: 2px solid transparent;\n    font-size: 13px;\n    color: var(--text-dim);\n    text-decoration: none;\n    transition: all 120ms;\n  }\n  .toc-list a:hover {\n    color: var(--text);\n    border-left-color: var(--blue);\n    background: rgba(66,103,163,.05);\n  }\n  .toc-list .toc-sub a {\n    padding-left: 24px;\n    font-size: 12px;\n    color: var(--text-faint);\n  }\n  .toc-num {\n    font-family: var(--ff-mono);\n    font-size: 10px;\n    margin-right: 8px;\n    color: var(--text-faint);\n  }\n\n  .content { min-width: 0; }\n\n  /* ── Hero ──────────────────────────────────────────────── */\n  .hero {\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    background:\n      linear-gradient(135deg, rgba(168,50,59,0.08), transparent 50%),\n      linear-gradient(220deg, rgba(66,103,163,0.10), transparent 60%),\n      var(--panel);\n    padding: 40px 36px;\n    margin-bottom: 40px;\n  }\n  .hero-eyebrow {\n    font-family: var(--ff-display);\n    font-size: 11px; font-weight: 600; letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--red-bright);\n    margin-bottom: 8px;\n  }\n  .hero h1 {\n    font-family: var(--ff-display);\n    font-size: 44px; font-weight: 700; letter-spacing: -0.01em;\n    line-height: 1.05;\n    color: var(--text);\n    margin: 0 0 14px;\n  }\n  .hero p {\n    font-size: 17px;\n    color: var(--text-2);\n    margin: 0;\n    max-width: 60ch;\n    line-height: 1.55;\n  }\n  .hero-stats {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 16px;\n    margin-top: 28px;\n    padding-top: 24px;\n    border-top: 1px solid var(--border-soft);\n  }\n  .stat-label {\n    font-family: var(--ff-display);\n    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--text-faint);\n  }\n  .stat-val {\n    font-family: var(--ff-display);\n    font-size: 22px; font-weight: 600;\n    color: var(--text);\n    margin-top: 4px;\n  }\n\n  /* ── Sections ──────────────────────────────────────────── */\n  section { margin-bottom: 56px; }\n  section h2 {\n    font-family: var(--ff-display);\n    font-size: 30px; font-weight: 700; letter-spacing: -0.01em;\n    color: var(--text);\n    margin: 0 0 8px;\n    padding-bottom: 12px;\n    border-bottom: 1px solid var(--border);\n    display: flex; align-items: baseline; gap: 12px;\n  }\n  section h2 .num {\n    font-family: var(--ff-mono);\n    font-size: 14px; font-weight: 500;\n    color: var(--red-bright);\n    letter-spacing: 0.1em;\n  }\n  section h3 {\n    font-family: var(--ff-display);\n    font-size: 20px; font-weight: 600;\n    color: var(--text);\n    margin: 32px 0 8px;\n    letter-spacing: 0.01em;\n  }\n  section h4 {\n    font-family: var(--ff-display);\n    font-size: 14px; font-weight: 600;\n    letter-spacing: 0.06em; text-transform: uppercase;\n    color: var(--text-dim);\n    margin: 20px 0 8px;\n  }\n  section .section-sub {\n    color: var(--text-dim);\n    font-size: 14px;\n    margin: 0 0 24px;\n    max-width: 64ch;\n  }\n  section p { max-width: 70ch; }\n\n  /* ── Callouts (jargon translator) ──────────────────────── */\n  .callout {\n    display: grid;\n    grid-template-columns: 28px 1fr;\n    gap: 12px;\n    background: rgba(66,103,163,0.06);\n    border-left: 3px solid var(--blue);\n    border-radius: 0 4px 4px 0;\n    padding: 14px 16px;\n    margin: 16px 0;\n  }\n  .callout-icon {\n    font-family: var(--ff-display);\n    font-size: 11px; font-weight: 700;\n    background: var(--blue);\n    color: white;\n    border-radius: 50%;\n    width: 24px; height: 24px;\n    display: inline-flex; align-items: center; justify-content: center;\n    letter-spacing: 0.04em;\n  }\n  .callout-body { font-size: 14px; line-height: 1.55; }\n  .callout-body strong { color: var(--text); }\n  .callout-plain { background: rgba(212,164,55,0.06); border-left-color: var(--amber); }\n  .callout-plain .callout-icon { background: var(--amber); color: #29261b; }\n  .callout-warn { background: rgba(168,50,59,0.08); border-left-color: var(--red); }\n  .callout-warn .callout-icon { background: var(--red); color: white; }\n\n  /* ── Tables ────────────────────────────────────────────── */\n  .table {\n    width: 100%;\n    border-collapse: collapse;\n    margin: 16px 0;\n    border: 1px solid var(--border);\n    border-radius: 6px;\n    overflow: hidden;\n    background: rgba(0,0,0,0.15);\n    font-size: 14px;\n  }\n  .table th {\n    text-align: left;\n    background: var(--panel-2);\n    padding: 10px 14px;\n    font-family: var(--ff-display);\n    font-size: 12px;\n    letter-spacing: 0.08em; text-transform: uppercase;\n    color: var(--text);\n    border-bottom: 1px solid var(--border);\n  }\n  .table td {\n    padding: 10px 14px;\n    border-bottom: 1px solid var(--border-soft);\n    vertical-align: top;\n    color: var(--text-2);\n  }\n  .table tr:last-child td { border-bottom: 0; }\n  .table tr:hover td { background: rgba(91,133,199,0.04); }\n  .table code, code {\n    font-family: var(--ff-mono);\n    font-size: 0.88em;\n    background: rgba(91,133,199,0.12);\n    color: var(--text);\n    padding: 1px 6px;\n    border-radius: 3px;\n  }\n\n  /* ── Pills ─────────────────────────────────────────────── */\n  .pill {\n    display: inline-block;\n    padding: 1px 8px;\n    border-radius: 3px;\n    font-family: var(--ff-mono);\n    font-size: 10px;\n    font-weight: 500;\n    letter-spacing: 0.06em;\n    text-transform: uppercase;\n    margin-right: 4px;\n  }\n  .pill-have   { background: rgba(76,175,106,0.18); color: var(--green); }\n  .pill-need   { background: rgba(168,50,59,0.18); color: var(--red-bright); }\n  .pill-easy   { background: rgba(76,175,106,0.18); color: var(--green); }\n  .pill-mid    { background: rgba(212,164,55,0.18); color: var(--amber); }\n  .pill-hard   { background: rgba(168,50,59,0.18); color: var(--red-bright); }\n  .pill-blue   { background: rgba(66,103,163,0.2); color: var(--blue-bright); }\n\n  /* ── Architecture diagram ─────────────────────────────── */\n  .arch {\n    display: flex; flex-direction: column; gap: 14px;\n    background: rgba(0,0,0,0.18);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 24px;\n    margin: 16px 0;\n  }\n  .arch-tier {\n    display: grid; grid-template-columns: 100px 1fr; gap: 16px;\n    align-items: stretch;\n  }\n  .arch-tier-label {\n    font-family: var(--ff-display);\n    font-size: 11px; font-weight: 600;\n    letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--text-dim);\n    padding-top: 16px;\n  }\n  .arch-row {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));\n    gap: 8px;\n  }\n  .arch-box {\n    background: var(--panel);\n    border: 1px solid var(--border-strong);\n    border-radius: 5px;\n    padding: 12px 12px;\n    text-align: center;\n  }\n  .arch-box-title {\n    font-family: var(--ff-display);\n    font-size: 12px; font-weight: 600;\n    letter-spacing: 0.04em;\n    color: var(--text);\n  }\n  .arch-box-sub {\n    font-family: var(--ff-mono);\n    font-size: 10px;\n    color: var(--text-faint);\n    margin-top: 2px;\n  }\n  .arch-tier-frontend .arch-box { border-color: var(--blue); }\n  .arch-tier-frontend .arch-box-title { color: var(--blue-bright); }\n  .arch-tier-backend  .arch-box { border-color: var(--red); }\n  .arch-tier-backend  .arch-box-title { color: var(--red-bright); }\n  .arch-tier-external .arch-box { border-color: var(--amber); border-style: dashed; }\n  .arch-tier-external .arch-box-title { color: var(--amber); }\n  .arch-arrows {\n    display: grid; grid-template-columns: 100px 1fr; gap: 16px;\n    margin: -8px 0;\n  }\n  .arch-arrows-line {\n    text-align: center;\n    color: var(--text-faint);\n    font-family: var(--ff-mono);\n    font-size: 14px;\n    letter-spacing: 1em;\n  }\n\n  /* ── Code block ────────────────────────────────────────── */\n  pre.code {\n    background: rgba(0,0,0,0.35);\n    border: 1px solid var(--border);\n    border-radius: 5px;\n    padding: 14px 16px;\n    font-family: var(--ff-mono);\n    font-size: 12.5px;\n    color: var(--text-2);\n    overflow-x: auto;\n    line-height: 1.5;\n    margin: 14px 0;\n  }\n  pre.code .k { color: var(--blue-bright); }\n  pre.code .s { color: var(--green); }\n  pre.code .c { color: var(--text-faint); font-style: italic; }\n  pre.code .n { color: var(--amber); }\n\n  /* ── Build phases ──────────────────────────────────────── */\n  .phases {\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: 14px;\n    margin: 18px 0;\n  }\n  .phase-card {\n    background: var(--panel);\n    border: 1px solid var(--border);\n    border-left: 4px solid var(--phase-color, var(--blue));\n    border-radius: 5px;\n    padding: 18px 22px;\n    display: grid;\n    grid-template-columns: 56px 1fr 100px;\n    gap: 18px;\n    align-items: start;\n  }\n  .phase-num {\n    font-family: var(--ff-display);\n    font-size: 36px; font-weight: 700;\n    color: var(--phase-color, var(--blue));\n    line-height: 1;\n  }\n  .phase-body h4 {\n    margin: 0 0 6px;\n    color: var(--text);\n    font-family: var(--ff-display);\n    font-size: 18px;\n    text-transform: none;\n    letter-spacing: 0;\n  }\n  .phase-body p { margin: 0 0 6px; font-size: 14px; }\n  .phase-body ul { margin: 4px 0; padding-left: 18px; font-size: 13px; }\n  .phase-body ul li { margin: 2px 0; }\n  .phase-time {\n    text-align: right;\n    font-family: var(--ff-mono);\n    font-size: 11px;\n    color: var(--text-faint);\n  }\n  .phase-time strong {\n    display: block;\n    font-family: var(--ff-display);\n    font-size: 22px;\n    color: var(--text);\n    font-weight: 600;\n    margin-bottom: 2px;\n  }\n\n  /* ── Cost cards ───────────────────────────────────────── */\n  .costs {\n    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n    gap: 12px; margin: 16px 0;\n  }\n  .cost-card {\n    background: var(--panel);\n    border: 1px solid var(--border);\n    border-radius: 5px;\n    padding: 16px;\n  }\n  .cost-name {\n    font-family: var(--ff-display);\n    font-size: 13px; font-weight: 600;\n    letter-spacing: 0.04em;\n    color: var(--text);\n  }\n  .cost-tier {\n    font-family: var(--ff-mono); font-size: 10px;\n    color: var(--text-faint);\n    margin-bottom: 8px;\n  }\n  .cost-price {\n    font-family: var(--ff-display);\n    font-size: 24px; font-weight: 700;\n    color: var(--text);\n  }\n  .cost-price .unit { font-size: 12px; color: var(--text-faint); margin-left: 4px; }\n  .cost-note { font-size: 12px; color: var(--text-dim); margin-top: 6px; }\n\n  /* ── Glossary ──────────────────────────────────────────── */\n  .glossary {\n    display: grid; grid-template-columns: 200px 1fr;\n    gap: 10px 24px;\n    margin: 16px 0;\n  }\n  .gloss-term {\n    font-family: var(--ff-mono);\n    font-size: 13px;\n    color: var(--amber);\n    font-weight: 500;\n  }\n  .gloss-def { font-size: 14px; color: var(--text-2); }\n\n  /* ── Misc ──────────────────────────────────────────────── */\n  ul { line-height: 1.65; }\n  ul li { margin: 4px 0; }\n  strong { color: var(--text); }\n  em { color: var(--text); font-style: normal; font-weight: 500; }\n  a { color: var(--blue-bright); text-decoration: none; }\n  a:hover { text-decoration: underline; }\n  hr { border: 0; border-top: 1px solid var(--border-soft); margin: 32px 0; }\n\n  ::-webkit-scrollbar { width: 8px; height: 8px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  ::-webkit-scrollbar-thumb { background: rgba(91,133,199,.15); border-radius: 4px; }\n  ::-webkit-scrollbar-thumb:hover { background: rgba(91,133,199,.3); }\n\n  @media (max-width: 960px) {\n    .layout { grid-template-columns: 1fr; }\n    .toc { position: static; max-height: none; }\n    .hero h1 { font-size: 32px; }\n    .hero-stats { grid-template-columns: repeat(2, 1fr); }\n    .phase-card { grid-template-columns: 1fr; }\n    .glossary { grid-template-columns: 1fr; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-screen-label=\"Earl OS Tech Design Doc\">\n\n\n\n<div class=\"topbar\">\n  <img src=\"f9407836-5083-4a43-8bcd-790cdab7e270\" alt=\"EN\">\n  <span class=\"topbar-brand\">EARL OS<\u002Fspan>\n  <span class=\"topbar-sep\">·<\u002Fspan>\n  <span class=\"topbar-doc\">Technical Design Document<\u002Fspan>\n  <span class=\"topbar-meta\">v1.0 · May 2026<\u002Fspan>\n<\u002Fdiv>\n\n<div class=\"layout\">\n\n  <!-- ─── TOC ─────────────────────────────────────────────── -->\n  <aside class=\"toc\">\n    <div class=\"toc-title\">Contents<\u002Fdiv>\n    <ul class=\"toc-list\">\n      <li><a href=\"#overview\"><span class=\"toc-num\">00<\u002Fspan> Overview<\u002Fa><\u002Fli>\n      <li><a href=\"#today\"><span class=\"toc-num\">01<\u002Fspan> What works today<\u002Fa><\u002Fli>\n      <li><a href=\"#bigpicture\"><span class=\"toc-num\">02<\u002Fspan> The big picture<\u002Fa><\u002Fli>\n      <li><a href=\"#stack\"><span class=\"toc-num\">03<\u002Fspan> Tech stack<\u002Fa><\u002Fli>\n      <li><a href=\"#datamodel\"><span class=\"toc-num\">04<\u002Fspan> Data model<\u002Fa><\u002Fli>\n      <li><a href=\"#widgets\"><span class=\"toc-num\">05<\u002Fspan> Widget-by-widget<\u002Fa><\u002Fli>\n      <li><a href=\"#auth\"><span class=\"toc-num\">06<\u002Fspan> Auth &amp; security<\u002Fa><\u002Fli>\n      <li><a href=\"#sync\"><span class=\"toc-num\">07<\u002Fspan> Sync across devices<\u002Fa><\u002Fli>\n      <li><a href=\"#mobile\"><span class=\"toc-num\">08<\u002Fspan> Mobile strategy<\u002Fa><\u002Fli>\n      <li><a href=\"#build\"><span class=\"toc-num\">09<\u002Fspan> Build plan<\u002Fa><\u002Fli>\n      <li><a href=\"#costs\"><span class=\"toc-num\">10<\u002Fspan> Costs<\u002Fa><\u002Fli>\n      <li><a href=\"#risks\"><span class=\"toc-num\">11<\u002Fspan> Risks &amp; open questions<\u002Fa><\u002Fli>\n      <li><a href=\"#glossary\"><span class=\"toc-num\">12<\u002Fspan> Glossary<\u002Fa><\u002Fli>\n      <li><a href=\"#next\"><span class=\"toc-num\">13<\u002Fspan> Next steps<\u002Fa><\u002Fli>\n    <\u002Ful>\n  <\u002Faside>\n\n  <!-- ─── CONTENT ─────────────────────────────────────────── -->\n  <main class=\"content\">\n\n    <!-- ── HERO ────────────────────────────────────────────── -->\n    <div class=\"hero\">\n      <div class=\"hero-eyebrow\">Tech Design · Earl OS v1.0<\u002Fdiv>\n      <h1>From prototype to a real product, one step at a time.<\u002Fh1>\n      <p>This doc explains — in plain English — what needs to be built behind Earl OS so it actually runs your day, syncs to your phone, talks to Gmail, and survives a browser refresh. No prior software background assumed.<\u002Fp>\n      <div class=\"hero-stats\">\n        <div><div class=\"stat-label\">Phases<\u002Fdiv><div class=\"stat-val\">4<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"stat-label\">MVP Time<\u002Fdiv><div class=\"stat-val\">2 weeks<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"stat-label\">Full v1<\u002Fdiv><div class=\"stat-val\">6 weeks<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"stat-label\">Monthly Cost<\u002Fdiv><div class=\"stat-val\">~$0<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── 00 OVERVIEW ─────────────────────────────────────── -->\n    <section id=\"overview\">\n      <h2><span class=\"num\">00<\u002Fspan> Overview<\u002Fh2>\n      <p class=\"section-sub\">What we're building, and what we're <em>not<\u002Fem> building.<\u002Fp>\n\n      <p>Earl OS is your daily command center for running Earl Neal Event Management Services. It pulls together everything you check in a typical work day or show day — calendar, email, weather, news, tasks, journals — into one window-manager dashboard you can rearrange to taste. It works in any modern web browser and (eventually) on your phone.<\u002Fp>\n\n      <h3>In scope for v1<\u002Fh3>\n      <ul>\n        <li>Authenticated single-user app (just you for now, but built so you can invite crew later)<\u002Fli>\n        <li>Real Gmail and Google Calendar integration<\u002Fli>\n        <li>Real weather data for outdoor stops<\u002Fli>\n        <li>News/industry feed aggregated from RSS<\u002Fli>\n        <li>Show schedule, daily-resetting task templates, journals, notes<\u002Fli>\n        <li>Sync across all your devices in real time<\u002Fli>\n        <li>Works offline (with sync when you reconnect)<\u002Fli>\n      <\u002Ful>\n\n      <h3>Out of scope (for now)<\u002Fh3>\n      <ul>\n        <li>Multi-user collaboration (sharing show journals with crew, etc.) — easy to add in v2<\u002Fli>\n        <li>Native iPhone/Android apps — we'll use a PWA first (more on that below)<\u002Fli>\n        <li>AI features (auto-summarize emails, suggest tasks) — possible later, not foundational<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <!-- ── 01 WHAT WORKS TODAY ─────────────────────────────── -->\n    <section id=\"today\">\n      <h2><span class=\"num\">01<\u002Fspan> What works today vs what's left to build<\u002Fh2>\n      <p class=\"section-sub\">The prototype you've been using has the full interface and persistence — but only on one device, and with fake data for some windows. Here's the gap to close.<\u002Fp>\n\n      <table class=\"table\">\n        <thead>\n          <tr><th>Window<\u002Fth><th>Status today<\u002Fth><th>To make it real, we need<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td><strong>Personal<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-have\">Working<\u002Fspan> Saves on this browser only<\u002Ftd>\n            <td>Move data to cloud database so it follows you across devices<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Calendar<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-need\">Mock data<\u002Fspan> Hardcoded events<\u002Ftd>\n            <td>Read from your Google Calendar via API<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Gmail<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-need\">Mock data<\u002Fspan> Fake inbox<\u002Ftd>\n            <td>Read from your Gmail via Google's API<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Weather<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-need\">Mock data<\u002Fspan> Fixed values<\u002Ftd>\n            <td>Live forecast API, geocoded from your venue addresses<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>News &amp; Industry<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-need\">Mock data<\u002Fspan> Fixed headlines<\u002Ftd>\n            <td>Background job pulling RSS feeds every 30 minutes<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Tasks<\u002Fstrong> (3 kinds)<\u002Ftd>\n            <td><span class=\"pill pill-have\">Working<\u002Fspan> Including the daily-reset templates<\u002Ftd>\n            <td>Same — move from browser to cloud database<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Quick Notes<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-have\">Working<\u002Fspan><\u002Ftd>\n            <td>Move to cloud DB<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Personal Journal<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-have\">Working<\u002Fspan><\u002Ftd>\n            <td>Move to cloud DB; add export-to-PDF later<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Show Journal<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-have\">Working<\u002Fspan><\u002Ftd>\n            <td>Move to cloud DB; add export &amp; archive to Google Drive<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <div class=\"callout callout-plain\">\n        <span class=\"callout-icon\">i<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>Plain English:<\u002Fstrong> About half the app already works — the parts <em>you<\u002Fem> control (tasks, journals, notes, personal info). The half that needs real data from external services (Gmail, Calendar, Weather, News) is where the new engineering work goes.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 02 BIG PICTURE ──────────────────────────────────── -->\n    <section id=\"bigpicture\">\n      <h2><span class=\"num\">02<\u002Fspan> The big picture<\u002Fh2>\n      <p class=\"section-sub\">Three layers. The browser you see, the cloud database that remembers everything, and the third-party services we pull data from.<\u002Fp>\n\n      <div class=\"arch\">\n        <div class=\"arch-tier arch-tier-frontend\">\n          <div class=\"arch-tier-label\">Frontend<br>(what you see)<\u002Fdiv>\n          <div class=\"arch-row\">\n            <div class=\"arch-box\">\n              <div class=\"arch-box-title\">Browser App<\u002Fdiv>\n              <div class=\"arch-box-sub\">Laptop, desktop<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"arch-box\">\n              <div class=\"arch-box-title\">PWA<\u002Fdiv>\n              <div class=\"arch-box-sub\">Phone, iPad<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"arch-arrows\">\n          <div><\u002Fdiv>\n          <div class=\"arch-arrows-line\">↕ ↕<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"arch-tier arch-tier-backend\">\n          <div class=\"arch-tier-label\">Backend<br>(your data)<\u002Fdiv>\n          <div class=\"arch-row\">\n            <div class=\"arch-box\">\n              <div class=\"arch-box-title\">Auth<\u002Fdiv>\n              <div class=\"arch-box-sub\">Sign in with Google<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"arch-box\">\n              <div class=\"arch-box-title\">Database<\u002Fdiv>\n              <div class=\"arch-box-sub\">Tasks, journals, notes<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"arch-box\">\n              <div class=\"arch-box-title\">Realtime sync<\u002Fdiv>\n              <div class=\"arch-box-sub\">Multi-device<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"arch-box\">\n              <div class=\"arch-box-title\">Edge Functions<\u002Fdiv>\n              <div class=\"arch-box-sub\">RSS polling, etc.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"arch-arrows\">\n          <div><\u002Fdiv>\n          <div class=\"arch-arrows-line\">↕<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"arch-tier arch-tier-external\">\n          <div class=\"arch-tier-label\">External<br>services<\u002Fdiv>\n          <div class=\"arch-row\">\n            <div class=\"arch-box\"><div class=\"arch-box-title\">Gmail API<\u002Fdiv><div class=\"arch-box-sub\">Inbox<\u002Fdiv><\u002Fdiv>\n            <div class=\"arch-box\"><div class=\"arch-box-title\">Calendar API<\u002Fdiv><div class=\"arch-box-sub\">Events<\u002Fdiv><\u002Fdiv>\n            <div class=\"arch-box\"><div class=\"arch-box-title\">Tomorrow.io<\u002Fdiv><div class=\"arch-box-sub\">Weather<\u002Fdiv><\u002Fdiv>\n            <div class=\"arch-box\"><div class=\"arch-box-title\">RSS Feeds<\u002Fdiv><div class=\"arch-box-sub\">News<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"callout\">\n        <span class=\"callout-icon\">?<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>Why three layers?<\u002Fstrong> The browser only knows how to draw the screen. Your data lives in the cloud so it follows you device-to-device. The external services are the source of truth for things we don't generate ourselves (email, calendar, weather, news). Splitting them out means we can swap any one of them later without rewriting the others.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 03 STACK ────────────────────────────────────────── -->\n    <section id=\"stack\">\n      <h2><span class=\"num\">03<\u002Fspan> Tech stack<\u002Fh2>\n      <p class=\"section-sub\">What software we pick for each layer, and why.<\u002Fp>\n\n      <table class=\"table\">\n        <thead>\n          <tr><th>Layer<\u002Fth><th>Tool<\u002Fth><th>Why this one<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td><strong>Frontend<\u002Fstrong><\u002Ftd>\n            <td><code>React<\u002Fcode> + <code>Vite<\u002Fcode><\u002Ftd>\n            <td>The prototype already uses React. Vite is a modern build tool — fast, simple. Industry standard. Tons of developers know it.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Styling<\u002Fstrong><\u002Ftd>\n            <td><code>CSS<\u002Fcode> (already done)<\u002Ftd>\n            <td>The dark Earl OS look is already written. We just bring it along.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Hosting (frontend)<\u002Fstrong><\u002Ftd>\n            <td><code>Vercel<\u002Fcode><\u002Ftd>\n            <td>One-click deploy from Git. Free for personal use. Built by the React team's friends — works seamlessly.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Backend / Database / Auth / Realtime<\u002Fstrong><\u002Ftd>\n            <td><code>Supabase<\u002Fcode><\u002Ftd>\n            <td>One service does four jobs. PostgreSQL database, login system, realtime sync, file storage. Open source, generous free tier, scales when you need it to.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Background jobs<\u002Fstrong><\u002Ftd>\n            <td><code>Supabase Edge Functions<\u002Fcode> + <code>cron<\u002Fcode><\u002Ftd>\n            <td>Tiny serverless scripts that run on a schedule. Used for RSS polling and weather caching. Already part of Supabase, no extra service.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Gmail / Calendar<\u002Fstrong><\u002Ftd>\n            <td>Google APIs (OAuth)<\u002Ftd>\n            <td>The only real option. Google's own SDKs. Free for personal use.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Weather<\u002Fstrong><\u002Ftd>\n            <td><code>Tomorrow.io<\u002Fcode><\u002Ftd>\n            <td>Best severe-weather alerts of any consumer API (heat, wind, lightning) — critical for outdoor events. Free tier covers our usage.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>News<\u002Fstrong><\u002Ftd>\n            <td>Direct RSS (Pollstar, Billboard, IQ, etc.)<\u002Ftd>\n            <td>Cheaper and faster than NewsAPI. Each publication exposes a free RSS feed. We poll them every 30 min.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Domain &amp; DNS<\u002Fstrong><\u002Ftd>\n            <td><code>GoDaddy<\u002Fcode> (already owned)<\u002Ftd>\n            <td>You already own <code>earlneal.com<\u002Fcode>. Your portfolio/services site at <code>www.earlneal.com<\u002Fcode> stays untouched; we point <code>os.earlneal.com<\u002Fcode> at Vercel via a single DNS record on GoDaddy. Zero migration of your current site.<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <div class=\"callout callout-plain\">\n        <span class=\"callout-icon\">i<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>About GoDaddy:<\u002Fstrong> Your existing hosting is great for the portfolio site but isn't built for a real-time app like Earl OS — it doesn't support PostgreSQL, OAuth-backed APIs, or live sync. The industry-standard pattern is to keep the marketing site on its current host and run the app on a service designed for apps. That's what Vercel + Supabase do. Your <code>earlneal.com<\u002Fcode> visitors never know the difference — both sit under the same brand.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"callout\">\n        <span class=\"callout-icon\">?<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>Why Supabase instead of Firebase or AWS?<\u002Fstrong> Supabase uses PostgreSQL — a real database that any developer on earth can read. If you ever want to switch services or hand the project off, you can. Firebase locks you into Google's proprietary format. AWS is overkill for one person.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 04 DATA MODEL ───────────────────────────────────── -->\n    <section id=\"datamodel\">\n      <h2><span class=\"num\">04<\u002Fspan> Data model<\u002Fh2>\n      <p class=\"section-sub\">What gets stored, and how it's organized. Each row in the table below is a \"table\" in the database — think of it like a spreadsheet tab.<\u002Fp>\n\n      <table class=\"table\">\n        <thead>\n          <tr><th>Table<\u002Fth><th>What it holds<\u002Fth><th>Example row<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td><code>users<\u002Fcode><\u002Ftd>\n            <td>Your account info<\u002Ftd>\n            <td>id · email · name · title · status · current_event · current_venue<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>show_dates<\u002Fcode><\u002Ftd>\n            <td>Every date you have a show, with details<\u002Ftd>\n            <td>user_id · date · venue · city · is_outdoor · cap · load_in_time<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>task_templates<\u002Fcode><\u002Ftd>\n            <td>The repeating checklists (Office daily, Show pre/day/post)<\u002Ftd>\n            <td>id · user_id · kind · text · order<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>task_state<\u002Fcode><\u002Ftd>\n            <td>Which template tasks are checked, for which date<\u002Ftd>\n            <td>user_id · template_id · scope_date · done<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>tasks_oneoff<\u002Fcode><\u002Ftd>\n            <td>The one-off task list (not a template)<\u002Ftd>\n            <td>id · user_id · text · done · created_at<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>journal_personal<\u002Fcode><\u002Ftd>\n            <td>One entry per calendar day<\u002Ftd>\n            <td>user_id · date · mood · energy · grateful · win · reflection<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>journal_show<\u002Fcode><\u002Ftd>\n            <td>One entry per show date<\u002Ftd>\n            <td>user_id · show_date · venue · times · attendance · arrival · parking · load_in · meals · show · load_out · depart · general<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>notes<\u002Fcode><\u002Ftd>\n            <td>The Quick Notes scratchpad (single blob)<\u002Ftd>\n            <td>user_id · text · updated_at<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>news_cache<\u002Fcode><\u002Ftd>\n            <td>Stories scraped from RSS, de-duplicated<\u002Ftd>\n            <td>id · source · category · title · url · published_at · hot<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><code>weather_cache<\u002Fcode><\u002Ftd>\n            <td>Recent weather lookups, so we don't hit the API every render<\u002Ftd>\n            <td>location · forecast_json · fetched_at<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <div class=\"callout callout-plain\">\n        <span class=\"callout-icon\">i<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>Why two tables for tasks?<\u002Fstrong> Because you asked for templates that carry over. The <code>task_templates<\u002Fcode> table holds the master list — change the text once, every future show picks it up. The <code>task_state<\u002Fcode> table holds \"which boxes are checked on which date\" — that's how today's check-offs don't carry to tomorrow.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 05 WIDGET BY WIDGET ─────────────────────────────── -->\n    <section id=\"widgets\">\n      <h2><span class=\"num\">05<\u002Fspan> Widget-by-widget breakdown<\u002Fh2>\n      <p class=\"section-sub\">What each window in the dashboard actually does behind the scenes.<\u002Fp>\n\n      <h3>Personal<\u002Fh3>\n      <p>Loads your <code>users<\u002Fcode> row. Edits write back to the same row.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-easy\">Trivial<\u002Fspan><\u002Fp>\n\n      <h3>Calendar<\u002Fh3>\n      <p>On load, requests today + tomorrow's events from your Google Calendar via the Calendar API. We cache the response for 5 minutes so we don't spam Google. A small badge in your calendar settings (or a \"type: show\" tag) lets us auto-detect which dates are show dates.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-mid\">Moderate<\u002Fspan> — Google OAuth is the trickiest part of v1.<\u002Fp>\n\n      <h3>Gmail<\u002Fh3>\n      <p>Same OAuth as Calendar (one login, two services). We request the last ~20 unread messages, store the latest preview in our DB so the inbox loads instantly when you open Earl OS, then refresh in the background.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-mid\">Moderate<\u002Fspan><\u002Fp>\n\n      <h3>Weather<\u002Fh3>\n      <p>For each show in your <code>show_dates<\u002Fcode> table marked <code>is_outdoor=true<\u002Fcode>, an Edge Function pulls a forecast from Tomorrow.io once an hour and stores it in <code>weather_cache<\u002Fcode>. The widget reads from cache. Risk classification (low/med/high) is computed from temperature, precip probability, and wind speed.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-mid\">Moderate<\u002Fspan><\u002Fp>\n\n      <h3>News &amp; Industry<\u002Fh3>\n      <p>A scheduled Edge Function runs every 30 minutes. It fetches each publication's RSS feed, de-duplicates against the news_cache table by URL, and inserts new stories. The widget queries the latest ~30 stories. Category is inferred from the source (or simple keyword rules).<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-easy\">Easy<\u002Fspan> — RSS is a 30-year-old protocol; well-supported.<\u002Fp>\n\n      <h3>Tasks (Show, Office, One-offs)<\u002Fh3>\n      <p>Already covered in the data model section. Templates carry over; daily state resets.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-easy\">Easy<\u002Fspan> (already prototyped)<\u002Fp>\n\n      <h3>Quick Notes<\u002Fh3>\n      <p>Plain text in a single row. Saves debounced 1 second after you stop typing.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-easy\">Trivial<\u002Fspan><\u002Fp>\n\n      <h3>Personal Journal &amp; Show Journal<\u002Fh3>\n      <p>Save on every keystroke (debounced). Each date is its own row. The Show Journal is keyed by show date, not calendar date — so the \"Show #042\" entry stays the same even if you reflect on it the next morning.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-easy\">Easy<\u002Fspan><\u002Fp>\n\n      <h3>Future: Export Show Journals as PDF<\u002Fh3>\n      <p>Edge Function generates a clean PDF from the show journal entry on demand or after every show, optionally auto-uploads to a designated Google Drive folder.<\u002Fp>\n      <p><strong>Complexity:<\u002Fstrong> <span class=\"pill pill-mid\">Moderate<\u002Fspan><\u002Fp>\n    <\u002Fsection>\n\n    <!-- ── 06 AUTH ─────────────────────────────────────────── -->\n    <section id=\"auth\">\n      <h2><span class=\"num\">06<\u002Fspan> Auth &amp; security<\u002Fh2>\n      <p class=\"section-sub\">How you log in, and how we keep your stuff safe.<\u002Fp>\n\n      <h3>Login<\u002Fh3>\n      <p>One button: \"<strong>Sign in with Google<\u002Fstrong>\". Same Google account you use for Gmail/Calendar. No password to remember. This single OAuth approval covers all three: identity, Gmail, Calendar.<\u002Fp>\n\n      <h3>Where credentials live<\u002Fh3>\n      <ul>\n        <li>You never see or store Google's password — Google handles it.<\u002Fli>\n        <li>Supabase stores a short-lived <em>refresh token<\u002Fem> (encrypted at rest) that lets us re-request access to Gmail/Calendar on your behalf, without you logging in again.<\u002Fli>\n        <li>If you revoke access in your Google account settings, our access dies instantly.<\u002Fli>\n      <\u002Ful>\n\n      <h3>Row-Level Security<\u002Fh3>\n      <p>Every table in Supabase has a rule that says <em>\"a row is visible only if its <code>user_id<\u002Fcode> matches the currently-signed-in user.\"<\u002Fem> Even if someone got a backup of the database, they couldn't read another user's data without that user's credentials.<\u002Fp>\n\n      <h3>What if your laptop is stolen?<\u002Fh3>\n      <ul>\n        <li>Earl OS auto-locks after a configurable idle period (default: 30 min). Logging back in requires Google.<\u002Fli>\n        <li>You can revoke a device from a \"Sessions\" page (we'll build this in v1).<\u002Fli>\n      <\u002Ful>\n\n      <div class=\"callout callout-warn\">\n        <span class=\"callout-icon\">!<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>Critical:<\u002Fstrong> Reading Gmail requires Google's \"Restricted Scope\" review — a one-time security review (~1-2 weeks turnaround) before the OAuth screen says \"Earl OS\" instead of \"unverified app.\" We can build and test in development first; submit for review once the app is stable.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 07 SYNC ─────────────────────────────────────────── -->\n    <section id=\"sync\">\n      <h2><span class=\"num\">07<\u002Fspan> Sync across devices<\u002Fh2>\n      <p class=\"section-sub\">Check a task on your laptop, see the check appear instantly on your iPad.<\u002Fp>\n\n      <p>Supabase has a built-in feature called <code>Realtime<\u002Fcode> — when a row in the database changes, every connected device gets notified within ~100 ms. The dashboard re-renders automatically. No \"pull to refresh\" needed.<\u002Fp>\n\n      <h3>What this means in practice<\u002Fh3>\n      <ul>\n        <li>Type a note on your laptop at the office → walk into the venue → open your iPad → note is there.<\u002Fli>\n        <li>Check off \"Soundcheck complete\" on your phone → your laptop on the bus updates instantly.<\u002Fli>\n        <li>If you're offline, changes queue locally and sync when you reconnect.<\u002Fli>\n      <\u002Ful>\n\n      <div class=\"callout\">\n        <span class=\"callout-icon\">?<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>What about conflicts?<\u002Fstrong> If two devices edit the same field at the same instant, the last write wins. For tasks (boolean check-offs) this is essentially never a problem. For text fields (journal entries), we'll use a small \"last edited 12s ago on iPhone\" indicator and warn if it looks like a clash.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 08 MOBILE ───────────────────────────────────────── -->\n    <section id=\"mobile\">\n      <h2><span class=\"num\">08<\u002Fspan> Mobile strategy<\u002Fh2>\n      <p class=\"section-sub\">How Earl OS lives on your phone — without building a separate iPhone/Android app.<\u002Fp>\n\n      <h3>Phase 1: PWA<\u002Fh3>\n      <p>A <em>Progressive Web App<\u002Fem> is a regular website that an iPhone or Android treats like an app. You visit Earl OS in Safari, tap \"Add to Home Screen,\" and now there's an Earl OS icon on your phone. Opens in fullscreen, works offline, looks and feels like a native app.<\u002Fp>\n      <ul>\n        <li><strong>Pros:<\u002Fstrong> Free (no App Store fees), no review process, deploy updates instantly.<\u002Fli>\n        <li><strong>Cons:<\u002Fstrong> No native push notifications on iPhone until iOS 16.4+ (we have that now, May 2026). Slightly less polish on gestures than a real native app.<\u002Fli>\n      <\u002Ful>\n\n      <h3>Phase 2 (if needed): React Native<\u002Fh3>\n      <p>If we ever need <em>push notifications<\u002Fem>, <em>better gestures<\u002Fem>, or to be in the App Store: React Native lets us reuse 80% of our existing React code in a native-quality iPhone/Android app. We'd revisit this in 6 months once we know what's missing.<\u002Fp>\n\n      <div class=\"callout callout-plain\">\n        <span class=\"callout-icon\">i<\u002Fspan>\n        <div class=\"callout-body\">\n          <strong>Plain English:<\u002Fstrong> Start with the website-on-your-home-screen approach. It's free, fast to ship, and 90% as good. Only build a \"real app\" if we discover something the PWA truly can't do.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 09 BUILD PLAN ───────────────────────────────────── -->\n    <section id=\"build\">\n      <h2><span class=\"num\">09<\u002Fspan> Build plan<\u002Fh2>\n      <p class=\"section-sub\">Four phases, each shipping something usable. We don't go to phase N+1 until phase N is solid.<\u002Fp>\n\n      <div class=\"phases\">\n\n        <div class=\"phase-card\" style=\"--phase-color: var(--green);\">\n          <div class=\"phase-num\">1<\u002Fdiv>\n          <div class=\"phase-body\">\n            <h4>Move existing data to the cloud<\u002Fh4>\n            <p>Stand up the database. Add login. Migrate everything that already works in the prototype — tasks, journals, notes, profile, show dates — from browser-only to cloud-backed. End of this phase: you can use Earl OS on any browser on any device, signed in with Google. No new features yet, but your data follows you.<\u002Fp>\n            <ul>\n              <li>Spin up Supabase project, define tables, enable Row-Level Security<\u002Fli>\n              <li>Add \"Sign in with Google\" to the existing prototype<\u002Fli>\n              <li>Replace every <code>localStorage<\u002Fcode> call with database calls<\u002Fli>\n              <li>Turn on Realtime sync<\u002Fli>\n              <li>Add <code>os.earlneal.com<\u002Fcode> DNS record on GoDaddy, pointing to Vercel<\u002Fli>\n              <li>Deploy to <code>os.earlneal.com<\u002Fcode><\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"phase-time\"><strong>1–2 wk<\u002Fstrong>Foundation<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"phase-card\" style=\"--phase-color: var(--blue);\">\n          <div class=\"phase-num\">2<\u002Fdiv>\n          <div class=\"phase-body\">\n            <h4>Google integrations (Gmail + Calendar)<\u002Fh4>\n            <p>The two biggest \"make-it-feel-real\" wins. Gmail starts showing your actual inbox; Calendar shows your actual events. Both pull from the same Google login from phase 1.<\u002Fp>\n            <ul>\n              <li>Add Gmail + Calendar OAuth scopes to the Google login<\u002Fli>\n              <li>Build a sync service that pulls the last N emails/events into the cache<\u002Fli>\n              <li>Wire the Gmail and Calendar windows to read from cache<\u002Fli>\n              <li>Auto-detect show dates from Calendar events tagged a certain way<\u002Fli>\n              <li>Submit for Google's restricted-scope review (parallel; takes 1-2 wk on their side)<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"phase-time\"><strong>1.5 wk<\u002Fstrong>Integrations<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"phase-card\" style=\"--phase-color: var(--amber);\">\n          <div class=\"phase-num\">3<\u002Fdiv>\n          <div class=\"phase-body\">\n            <h4>Weather, News, and mobile polish<\u002Fh4>\n            <p>Replace the last two mock-data windows. PWA installable on iPhone/iPad/Android.<\u002Fp>\n            <ul>\n              <li>Tomorrow.io integration with venue geocoding<\u002Fli>\n              <li>Risk computation for outdoor events<\u002Fli>\n              <li>RSS poller for ~8 industry publications, with de-duplication<\u002Fli>\n              <li>Category inference (Touring / Industry / Tech / Venues)<\u002Fli>\n              <li>Service worker for offline support<\u002Fli>\n              <li>\"Add to Home Screen\" tested on iPhone + iPad + Android<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"phase-time\"><strong>1.5 wk<\u002Fstrong>External data<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"phase-card\" style=\"--phase-color: var(--red);\">\n          <div class=\"phase-num\">4<\u002Fdiv>\n          <div class=\"phase-body\">\n            <h4>Polish, exports, &amp; nice-to-haves<\u002Fh4>\n            <p>The \"this feels finished\" pass.<\u002Fp>\n            <ul>\n              <li>Show Journal PDF export, auto-archive to Drive<\u002Fli>\n              <li>Push notifications for show-time approaching, weather alerts<\u002Fli>\n              <li>Backup &amp; restore (download your data anytime)<\u002Fli>\n              <li>Onboarding flow for first-time setup of show dates<\u002Fli>\n              <li>Optional: invite-a-crew-member (read-only access to your schedule)<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div class=\"phase-time\"><strong>1 wk<\u002Fstrong>Polish<\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 10 COSTS ────────────────────────────────────────── -->\n    <section id=\"costs\">\n      <h2><span class=\"num\">10<\u002Fspan> Costs<\u002Fh2>\n      <p class=\"section-sub\">Running this for one person, monthly. All prices in USD.<\u002Fp>\n\n      <div class=\"costs\">\n        <div class=\"cost-card\">\n          <div class=\"cost-name\">Domain (earlneal.com)<\u002Fdiv>\n          <div class=\"cost-tier\">GoDaddy — already owned<\u002Fdiv>\n          <div class=\"cost-price\">$0<span class=\"unit\">/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"cost-note\">No change — you already pay annually.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-card\">\n          <div class=\"cost-name\">Vercel<\u002Fdiv>\n          <div class=\"cost-tier\">Hobby tier<\u002Fdiv>\n          <div class=\"cost-price\">$0<span class=\"unit\">/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"cost-note\">Free indefinitely for personal use.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-card\">\n          <div class=\"cost-name\">Supabase<\u002Fdiv>\n          <div class=\"cost-tier\">Free → Pro at scale<\u002Fdiv>\n          <div class=\"cost-price\">$0–$25<span class=\"unit\">/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"cost-note\">Free for one user; Pro ($25) when you need more DB or want backups.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-card\">\n          <div class=\"cost-name\">Tomorrow.io Weather<\u002Fdiv>\n          <div class=\"cost-tier\">Free tier<\u002Fdiv>\n          <div class=\"cost-price\">$0<span class=\"unit\">/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"cost-note\">500 calls/day free. We need ~50/day.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-card\">\n          <div class=\"cost-name\">Google APIs<\u002Fdiv>\n          <div class=\"cost-tier\">Gmail, Calendar, Drive<\u002Fdiv>\n          <div class=\"cost-price\">$0<span class=\"unit\">/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"cost-note\">Free under quota for normal personal usage.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cost-card\">\n          <div class=\"cost-name\">RSS feeds<\u002Fdiv>\n          <div class=\"cost-tier\">Direct, no service<\u002Fdiv>\n          <div class=\"cost-price\">$0<span class=\"unit\">/mo<\u002Fspan><\u002Fdiv>\n          <div class=\"cost-note\">Public feeds. No fees.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin-top: 18px;\"><strong>Realistic total: $0/month for year one.<\u002Fstrong> Your GoDaddy domain is already covered. Once we cross into paid Supabase ($25/mo), still cheap for what it does — fully managed database, auth, realtime sync, and storage.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- ── 11 RISKS ────────────────────────────────────────── -->\n    <section id=\"risks\">\n      <h2><span class=\"num\">11<\u002Fspan> Risks &amp; open questions<\u002Fh2>\n      <p class=\"section-sub\">What could go wrong, and what we'd do about it.<\u002Fp>\n\n      <table class=\"table\">\n        <thead>\n          <tr><th>Risk<\u002Fth><th>Likelihood<\u002Fth><th>Mitigation<\u002Fth><\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td><strong>Google's OAuth review takes longer than expected<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-mid\">Medium<\u002Fspan><\u002Ftd>\n            <td>Start the review the day we begin Phase 2. Worst case: app marked \"unverified\" — you can still use it personally, just sees a warning screen on login.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>An RSS feed changes format and breaks parsing<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-mid\">Medium (over months)<\u002Fspan><\u002Ftd>\n            <td>Logging + monitoring. Quick fix: 30 min of code per affected source.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>You forget your Google password<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-easy\">Low<\u002Fspan><\u002Ftd>\n            <td>Google handles password recovery — not our problem.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>Supabase has an outage<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-easy\">Low<\u002Fspan><\u002Ftd>\n            <td>Earl OS falls back to last-cached data; you can still see things, just can't save until they're back. We'll add a clear \"offline / reconnecting\" indicator.<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td><strong>You want a feature we didn't plan for<\u002Fstrong><\u002Ftd>\n            <td><span class=\"pill pill-hard\">High<\u002Fspan><\u002Ftd>\n            <td>That's good. We have a clean architecture; new windows are easy to add.<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n\n      <h3>Open questions for you<\u002Fh3>\n      <ul>\n        <li>Is there a specific Google Calendar you want to designate as \"shows\"? Or do you want to mark events with a particular tag?<\u002Fli>\n        <li>Do you want crew members to ever have access (even read-only)?<\u002Fli>\n        <li>Do you want PDF exports to auto-archive to Drive or just download manually?<\u002Fli>\n        <li>Any other data sources we should pull in? (Pollstar Pro account, settlement tools, hotel booking confirmations, etc.)<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n\n    <!-- ── 12 GLOSSARY ─────────────────────────────────────── -->\n    <section id=\"glossary\">\n      <h2><span class=\"num\">12<\u002Fspan> Glossary<\u002Fh2>\n      <p class=\"section-sub\">Terms a developer will throw around. Cheat-sheet so you can call BS when you need to.<\u002Fp>\n\n      <div class=\"glossary\">\n        <div class=\"gloss-term\">API<\u002Fdiv>\n        <div class=\"gloss-def\">\"Application Programming Interface\" — a structured way for one piece of software to talk to another. When the dashboard fetches your Gmail, it's \"calling the Gmail API.\"<\u002Fdiv>\n\n        <div class=\"gloss-term\">OAuth<\u002Fdiv>\n        <div class=\"gloss-def\">The standard \"Sign in with Google / Facebook / Apple\" handshake. You give Earl OS permission to act on your behalf without ever giving us your password.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Backend<\u002Fdiv>\n        <div class=\"gloss-def\">Everything that runs on a server, not in your browser. Database, login system, scheduled jobs.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Frontend<\u002Fdiv>\n        <div class=\"gloss-def\">What you actually see and click on. Runs in your browser.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Database<\u002Fdiv>\n        <div class=\"gloss-def\">Where data is stored long-term. Think of it as a very strict spreadsheet that many people can read and write at once.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Table / Row / Column<\u002Fdiv>\n        <div class=\"gloss-def\">Database structure. A table is like a spreadsheet tab. Each row is one record (one task, one show, one email). Columns are the fields (text, done, date, etc.).<\u002Fdiv>\n\n        <div class=\"gloss-term\">PWA<\u002Fdiv>\n        <div class=\"gloss-def\">Progressive Web App. A website you can install to your phone's home screen and use offline like a real app.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Serverless / Edge Function<\u002Fdiv>\n        <div class=\"gloss-def\">A small piece of code that runs only when triggered (e.g. every 30 min on a schedule, or when someone clicks a button). No always-on server to babysit.<\u002Fdiv>\n\n        <div class=\"gloss-term\">RSS<\u002Fdiv>\n        <div class=\"gloss-def\">A standard, machine-readable format that most news sites publish. Lets us pull headlines without scraping.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Realtime<\u002Fdiv>\n        <div class=\"gloss-def\">When a database change pushes itself to all connected devices in milliseconds, instead of devices having to poll for updates.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Cache<\u002Fdiv>\n        <div class=\"gloss-def\">Saved-for-later copy of something. Speeds things up so we don't re-fetch the same data over and over.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Row-Level Security (RLS)<\u002Fdiv>\n        <div class=\"gloss-def\">A database rule that says \"this user can only see rows that belong to them.\" Keeps your data isolated from anyone else's.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Webhook<\u002Fdiv>\n        <div class=\"gloss-def\">\"Call us when X happens.\" Used so we don't have to poll constantly — e.g. Gmail can tell us \"new email arrived\" instead of us asking every 30 seconds.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Geocoding<\u002Fdiv>\n        <div class=\"gloss-def\">Turning a place name (\"Red Rocks Amphitheater\") into latitude/longitude so we can ask for its weather.<\u002Fdiv>\n\n        <div class=\"gloss-term\">Service Worker<\u002Fdiv>\n        <div class=\"gloss-def\">A small piece of code that runs in the background of your browser. Powers offline support in PWAs.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── 13 NEXT STEPS ───────────────────────────────────── -->\n    <section id=\"next\">\n      <h2><span class=\"num\">13<\u002Fspan> Next steps<\u002Fh2>\n      <p class=\"section-sub\">If you give the green light, here's what happens in the first 48 hours.<\u002Fp>\n\n      <ol style=\"line-height: 1.8;\">\n        <li><strong>Subdomain locked in: <code>os.earlneal.com<\u002Fcode><\u002Fstrong>. Echoes the product name and stays short for mobile typing.<\u002Fli>\n        <li><strong>Create accounts:<\u002Fstrong> Supabase, Vercel, Google Cloud Console (developer side), Tomorrow.io. All free. We'll do this together via a screen share.<\u002Fli>\n        <li><strong>Spin up the Supabase project<\u002Fstrong> and create the empty tables described in Section 4.<\u002Fli>\n        <li><strong>Connect the existing prototype to Supabase<\u002Fstrong> — your tasks, journals, and notes start saving to the cloud instead of just your browser.<\u002Fli>\n        <li><strong>Add one DNS record on GoDaddy:<\u002Fstrong> a <code>CNAME<\u002Fcode> for <code>os<\u002Fcode> pointing to Vercel. ~2 minutes inside GoDaddy's DNS panel; doesn't touch your existing website.<\u002Fli>\n        <li><strong>Deploy to <code>os.earlneal.com<\u002Fcode><\u002Fstrong> — you can now hit it from any device, and your portfolio site at <code>www.earlneal.com<\u002Fcode> is completely unaffected.<\u002Fli>\n      <\u002Fol>\n\n      <p>After that we're into Phase 2 (Gmail + Calendar), which is the most exciting visible upgrade.<\u002Fp>\n\n      <hr>\n\n      <p style=\"color: var(--text-dim); font-size: 13px;\">\n        Questions or changes to this plan? Tell me which sections need more detail and I'll expand them. Want a different stack (e.g. Firebase instead of Supabase)? Easy to swap — let me know your constraints.\n      <\u002Fp>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
</html>
